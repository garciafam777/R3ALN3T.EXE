version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: r3aln3t_telemetry_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: r3aln3t_persistence
    environment:
      POSTGRES_DB: r3aln3t
      POSTGRES_USER: r3aln3t
      POSTGRES_PASSWORD: r3aln3t_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
