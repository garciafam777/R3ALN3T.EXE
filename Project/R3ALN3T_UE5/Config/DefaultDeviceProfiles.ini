; R3ALN3T.EXE — 4K-ready Device Profiles (Echo, 2026-07-13)
; Purpose: guarantee full-resolution streaming of 4K card/character/UI textures
; when 4K source art lands. Additive config: base profiles are inherited from
; Engine/Config/BaseDeviceProfiles.ini; we only override what we need.
;
; What this buys us (no art required):
;   - r.Streaming.PoolSize high enough to keep 4K textures resident (no eviction blur)
;   - r.MaxAnisotropy=16 (crisp at oblique angles)
;   - r.Streaming.MipBias=0 (no mip-shift softening)
;   - TEXTUREGROUP_UI / _Character / _World MaxLODSize=4096 + NumStreamedMips=0
;     so 4K textures are imported/streamed at full res and never dropped.

[DeviceProfiles]
+DeviceProfileName="Windows"
+DeviceProfileName="Linux"
+DeviceProfileName="Mac"
+DeviceProfileName="Android"
+DeviceProfileName="iOS"

; ---- Desktop / console: 4K-class rendering ----
[Windows DeviceProfile]
DeviceType=Windows
BaseProfileName=
+CVars=r.Streaming.PoolSize=2048
+CVars=r.Streaming.PoolSizeWhenVSystemIsActive=2048
+CVars=r.MaxAnisotropy=16
+CVars=r.Streaming.MipBias=0
+CVars=r.Streaming.UseAllMips=1
+TextureLODGroups=(Group=TEXTUREGROUP_UI,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)
+TextureLODGroups=(Group=TEXTUREGROUP_Character,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)
+TextureLODGroups=(Group=TEXTUREGROUP_World,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)

[Linux DeviceProfile]
DeviceType=Linux
BaseProfileName=
+CVars=r.Streaming.PoolSize=2048
+CVars=r.MaxAnisotropy=16
+CVars=r.Streaming.MipBias=0
+TextureLODGroups=(Group=TEXTUREGROUP_UI,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)
+TextureLODGroups=(Group=TEXTUREGROUP_Character,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)

[Mac DeviceProfile]
DeviceType=Mac
BaseProfileName=
+CVars=r.Streaming.PoolSize=2048
+CVars=r.MaxAnisotropy=16
+CVars=r.Streaming.MipBias=0
+TextureLODGroups=(Group=TEXTUREGROUP_UI,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)
+TextureLODGroups=(Group=TEXTUREGROUP_Character,MinLODSize=1,MaxLODSize=4096,LODBias=0,MinMagFilter=aniso,MipFilter=point,NumStreamedMips=0,LODGroupFadeOutDistance0=0,LODGroupFadeOutDistance1=0)

; ---- Mobile: cap VRAM but keep anisotropic filtering ----
[Android DeviceProfile]
DeviceType=Android
BaseProfileName=
+CVars=r.Streaming.PoolSize=512
+CVars=r.MaxAnisotropy=8
+CVars=r.Streaming.MipBias=0

[iOS DeviceProfile]
DeviceType=iOS
BaseProfileName=
+CVars=r.Streaming.PoolSize=512
+CVars=r.MaxAnisotropy=8
+CVars=r.Streaming.MipBias=0
