<!DOCTYPE html>
<html>
<head>
    <title>Element Emoji Icons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
            font-family: Arial, sans-serif;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }
        .card {
            background: #1a1a2e;
            border: 2px solid #333;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #666;
            box-shadow: 0 8px 25px rgba(255,255,255,0.1);
        }
        .emoji {
            font-size: 64px;
            line-height: 1.2;
            display: block;
            margin-bottom: 10px;
        }
        .name {
            color: #aaa;
            font-size: 14px;
            font-family: Arial, sans-serif;
            letter-spacing: 0.5px;
        }
        .effect {
            color: #666;
            font-size: 10px;
            font-family: Arial, sans-serif;
            margin-top: 5px;
        }
        .download-btn {
            margin-top: 10px;
            padding: 4px 12px;
            background: #333;
            color: #aaa;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .download-btn:hover {
            background: #555;
            color: #fff;
        }
        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls button {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 8px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            transition: all 0.3s;
        }
        .controls button:hover {
            background: #555;
            border-color: #888;
        }
        .status {
            color: #666;
            font-size: 12px;
            font-family: Arial, sans-serif;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>⚡ Element Emoji Icons ⚡</h1>
    
    <div class="controls">
        <button onclick="downloadAll()">📥 Download All PNGs</button>
        <button onclick="copyEmojiNames()">📋 Copy Names</button>
        <button onclick="toggleSize()">🔍 Toggle Size</button>
    </div>
    
    <div class="grid" id="iconGrid"></div>
    <div class="status" id="status">Click any icon to copy its emoji</div>

    <script>
        const elements = [
            { name: "Fire", emoji: "🔥", effect: "burn pressure and damage over time" },
            { name: "Water", emoji: "💧", effect: "fluid flow, healing, control, and adaptation" },
            { name: "Lightning", emoji: "⚡", effect: "blinding speed, high burst, and stuns" },
            { name: "Ice", emoji: "❄️", effect: "target slows, freezing locks, and elevated defense" },
            { name: "Wind", emoji: "🌬️", effect: "increased evasion, node disruption, and mobility" },
            { name: "Earth", emoji: "🌍", effect: "unyielding tanking, heavy shields, and stability" },
            { name: "Light", emoji: "✨", effect: "debuff cleansing, hidden data reveal, and stat amplification" },
            { name: "Dark", emoji: "🌑", effect: "system curses, health drains, and stealth concealment" },
            { name: "Void", emoji: "🕳️", effect: "attribute erasure, space distortion, and suppression" },
            { name: "Metal", emoji: "⚙️", effect: "reinforced armor, piercing damage, and structural integrity" },
            { name: "Nature", emoji: "🌿", effect: "growth mechanics, automated restoration, and structural binds" },
            { name: "Sound", emoji: "🔊", effect: "kinetic shockwaves, targeting confusion, and frequency resonance" },
            { name: "Gravity", emoji: "🌀", effect: "spatial pulls, heavy crushing, and total immobilization" },
            { name: "Time", emoji: "⏳", effect: "cooldown delay, speed acceleration, and status rewind" },
            { name: "Blood", emoji: "🩸", effect: "strategic sacrifice, life sustain, and code corruption" },
            { name: "Poison", emoji: "☠️", effect: "code decay, status weakening, and stacking damage layers" },
            { name: "Crystal", emoji: "💎", effect: "reflective barriers, light redirection, and shattering shards" },
            { name: "Plasma", emoji: "💫", effect: "high-energy burn configurations, chain damage, and system overload" }
        ];

        let isLarge = false;

        function renderIcons() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            const emojiSize = isLarge ? '80px' : '64px';
            
            elements.forEach(el => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => copyToClipboard(el.emoji, el.name);
                
                const emoji = document.createElement('span');
                emoji.className = 'emoji';
                emoji.style.fontSize = emojiSize;
                emoji.textContent = el.emoji;
                card.appendChild(emoji);
                
                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = el.name;
                card.appendChild(name);
                
                const effect = document.createElement('div');
                effect.className = 'effect';
                effect.textContent = el.effect;
                card.appendChild(effect);
                
                const btn = document.createElement('button');
                btn.className = 'download-btn';
                btn.textContent = '📥 Download';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    downloadEmoji(el);
                };
                card.appendChild(btn);
                
                grid.appendChild(card);
            });
        }

        function downloadEmoji(element) {
            // Create canvas to render emoji
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Background
            const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            gradient.addColorStop(0, '#2a2a3e');
            gradient.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 256);
            
            // Border
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 3;
            ctx.roundRect(10, 10, 236, 236, 20);
            ctx.stroke();
            
            // Emoji
            ctx.font = '180px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(element.emoji, 128, 128);
            
            // Download
            const link = document.createElement('a');
            link.download = `${element.name.toLowerCase()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function downloadAll() {
            elements.forEach((el, i) => {
                setTimeout(() => downloadEmoji(el), i * 300);
            });
            document.getElementById('status').textContent = `📥 Downloading ${elements.length} icons...`;
        }

        function copyToClipboard(emoji, name) {
            navigator.clipboard.writeText(emoji).then(() => {
                document.getElementById('status').textContent = `✅ Copied ${name}: ${emoji}`;
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = emoji;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                document.getElementById('status').textContent = `✅ Copied ${name}: ${emoji}`;
            });
        }

        function copyEmojiNames() {
            const text = elements.map(el => `${el.name}: ${el.emoji}`).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('status').textContent = '✅ Copied all emoji names!';
            });
        }

        function toggleSize() {
            isLarge = !isLarge;
            renderIcons();
            document.getElementById('status').textContent = `🔍 ${isLarge ? 'Large' : 'Small'} mode`;
        }

        // Polyfill for roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        renderIcons();
    </script>
</body>
</html>
